
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useRef,useEffect}=React;
const B={dt:'#084c61',t:'#177e89',r:'#db3a34',g:'#ffc857',ch:'#323031'};
const ff=`'DM Sans',sans-serif`;
const fs=`'Lora',serif`;

function TopBar({active,set}){
  const tabs=['My Profile','AI Guide','Community'];
  return React.createElement('div',{style:{fontFamily:ff,background:B.dt,display:'flex',alignItems:'center',gap:0,padding:'0 28px',height:52,justifyContent:'space-between'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
      React.createElement('div',{style:{width:28,height:28,borderRadius:'50%',background:B.g,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:B.dt,fontFamily:fs}},'E'),
      React.createElement('span',{style:{color:'white',fontWeight:500,fontSize:17,fontFamily:fs,letterSpacing:'-.2px'}},'elikonas')
    ),
    React.createElement('div',{style:{display:'flex',gap:0}},
      tabs.map(t=>React.createElement('button',{key:t,onClick:()=>set(t),style:{background:'none',border:'none',borderBottom:active===t?`2px solid ${B.g}`:'2px solid transparent',color:active===t?'white':'rgba(255,255,255,.55)',padding:'0 18px',height:52,cursor:'pointer',fontSize:13.5,fontWeight:active===t?600:400,fontFamily:ff}},t))
    ),
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
      React.createElement('div',{style:{fontSize:12.5,color:'rgba(255,255,255,.6)',fontFamily:ff}},'Alex Lee'),
      React.createElement('div',{style:{width:30,height:30,borderRadius:'50%',background:B.t,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11.5,fontWeight:600}},'AL')
    )
  );
}

function ProfileScreen(){
  const units=[
    {n:'Google Data Analytics Certificate',p:'Coursera',s:'in progress',pct:68,cat:'Data & AI'},
    {n:'SQL for Data Science',p:'UC Davis · Coursera',s:'completed',pct:100,cat:'Data & AI'},
    {n:'Introduction to Python',p:'MIT OpenCourseWare',s:'completed',pct:100,cat:'Technology'},
    {n:'Data Visualization with Tableau',p:'Tableau Learning',s:'planned',pct:0,cat:'Data & AI'},
    {n:'Business Communication for Data Professionals',p:'LinkedIn Learning',s:'planned',pct:0,cat:'Business'},
  ];
  const sc={'in progress':B.g,'completed':'#2a9d5c','planned':'#8a8fa3'};
  const sb={'in progress':'#ffc85720','completed':'#2a9d5c1a','planned':'#8a8fa315'};
  const done=units.filter(u=>u.s==='completed').length;
  const inprog=units.filter(u=>u.s==='in progress').length;
  const r=40,circ=2*Math.PI*r,pct=Math.round(done/units.length*100),off=circ-(pct/100)*circ;

  return React.createElement('div',{style:{fontFamily:ff,background:'var(--color-background-tertiary)',minHeight:'calc(100vh - 52px)',padding:28}},
    React.createElement('div',{style:{maxWidth:900,margin:'0 auto'}},

      React.createElement('div',{style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:16,padding:'24px 28px',marginBottom:18,display:'flex',gap:24,alignItems:'flex-start'}},
        React.createElement('div',{style:{width:58,height:58,borderRadius:'50%',background:B.dt,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:21,fontWeight:600,flexShrink:0,fontFamily:fs}},'AL'),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:5}},
            React.createElement('h2',{style:{fontSize:22,fontWeight:600,color:B.ch,fontFamily:fs}},'Alex Lee'),
            React.createElement('span',{style:{fontSize:11.5,background:`${B.g}28`,color:'#8a6800',border:`1px solid ${B.g}66`,padding:'3px 10px',borderRadius:12,fontWeight:600}},'\u2605 Founding Member')
          ),
          React.createElement('p',{style:{fontSize:13.5,color:'var(--color-text-secondary)',marginBottom:14}},'Career changer \u00b7 Data & AI \u00b7 Technology \u00b7 Business'),
          React.createElement('div',{style:{display:'flex',gap:24}},
            [['Total ed-units',units.length],['Completed',done],['In progress',inprog],['Planned',units.length-done-inprog]].map(([l,v])=>
              React.createElement('div',{key:l},
                React.createElement('div',{style:{fontSize:24,fontWeight:700,color:B.ch,lineHeight:1.1}},v),
                React.createElement('div',{style:{fontSize:11.5,color:'var(--color-text-secondary)',marginTop:1}},l)
              )
            )
          )
        ),
        React.createElement('div',{style:{textAlign:'center',flexShrink:0}},
          React.createElement('svg',{width:96,height:96,viewBox:'0 0 96 96'},
            React.createElement('circle',{cx:48,cy:48,r:r,fill:'none',stroke:'var(--color-border-tertiary)',strokeWidth:7}),
            React.createElement('circle',{cx:48,cy:48,r:r,fill:'none',stroke:B.t,strokeWidth:7,strokeDasharray:circ,strokeDashoffset:off,strokeLinecap:'round',transform:'rotate(-90 48 48)'}),
            React.createElement('text',{x:48,y:44,textAnchor:'middle',fontSize:17,fontWeight:700,fill:B.ch,fontFamily:ff},pct+'%'),
            React.createElement('text',{x:48,y:61,textAnchor:'middle',fontSize:11,fill:'#888',fontFamily:ff},'pathway')
          )
        )
      ),

      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        React.createElement('h3',{style:{fontSize:15,fontWeight:600,color:B.ch}},'Learning record'),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('button',{style:{background:'none',border:`0.5px solid ${B.t}`,color:B.t,borderRadius:7,padding:'6px 14px',fontSize:12.5,cursor:'pointer',fontFamily:ff}},'Share record'),
          React.createElement('button',{style:{background:B.t,color:'white',border:'none',borderRadius:7,padding:'6px 14px',fontSize:12.5,fontWeight:500,cursor:'pointer',fontFamily:ff}},'+ Add learning')
        )
      ),

      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        units.map((u,i)=>React.createElement('div',{key:i,style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:10,padding:'14px 18px',display:'flex',alignItems:'center',gap:16}},
          React.createElement('div',{style:{width:36,height:36,borderRadius:8,background:u.s==='completed'?'#2a9d5c18':u.s==='in progress'?`${B.t}15`:'var(--color-background-secondary)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}},u.s==='completed'?'✓':u.s==='in progress'?'▶':'○'),
          React.createElement('div',{style:{flex:1}},
            React.createElement('div',{style:{fontSize:13.5,fontWeight:500,color:B.ch,marginBottom:3}},u.n),
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
              React.createElement('span',{style:{fontSize:12,color:'var(--color-text-secondary)'}},u.p),
              React.createElement('span',{style:{fontSize:11,background:'var(--color-background-secondary)',color:'var(--color-text-secondary)',padding:'1px 7px',borderRadius:8}},u.cat)
            ),
            u.s==='in progress'&&React.createElement('div',{style:{marginTop:7,display:'flex',alignItems:'center',gap:10}},
              React.createElement('div',{style:{flex:1,height:4,background:'var(--color-background-secondary)',borderRadius:2,overflow:'hidden'}},
                React.createElement('div',{style:{height:'100%',width:`${u.pct}%`,background:B.t,borderRadius:2}})
              ),
              React.createElement('span',{style:{fontSize:11.5,color:B.t,fontWeight:500,minWidth:30}},u.pct+'%')
            )
          ),
          React.createElement('span',{style:{fontSize:12,fontWeight:500,color:sc[u.s],background:sb[u.s],padding:'4px 11px',borderRadius:10,whiteSpace:'nowrap'}},u.s)
        ))
      )
    )
  );
}

function AIGuideScreen(){
  const [msgs,setMsgs]=useState([{r:'a',c:"Hi Alex! I'm Eli — your education guide. You're 68% through the Google Data Analytics Certificate, which puts you close to a real career milestone. You've also got a solid Python and SQL base already. What's on your mind today — pathway planning, or something specific about your next step?"}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bot=useRef(null);
  const suggestions=["What should I learn next?","Am I on track for a data career?","How long until I'm job-ready?"];
  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'})},[msgs,loading]);
  const send=async(txt)=>{
    const msg=txt||input;if(!msg.trim()||loading)return;
    const um={r:'u',c:msg};const next=[...msgs,um];
    setMsgs(next);setInput('');setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are Eli, a warm, knowledgeable AI education guide for Elikonas — an education marketplace that helps non-traditional learners find pathways that fit their real lives. You're talking with Alex, a career changer focused on Data & AI. Alex is 68% through the Google Data Analytics Certificate, has completed SQL for Data Science and Introduction to Python, and has Data Visualization with Tableau planned. Be warm, specific, and practical. Keep responses to 3-5 sentences. Do not use markdown formatting or bullet points.",messages:next.map(m=>({role:m.r==='u'?'user':'assistant',content:m.c}))})});
      const d=await res.json();
      setMsgs(p=>[...p,{r:'a',c:d.content?.[0]?.text||"I'm having a moment — try again?"}]);
    }catch(e){setMsgs(p=>[...p,{r:'a',c:"Something went wrong. Try again in a moment."}]);}
    setLoading(false);
  };

  return React.createElement('div',{style:{fontFamily:ff,background:'var(--color-background-tertiary)',minHeight:'calc(100vh - 52px)',padding:28}},
    React.createElement('div',{style:{maxWidth:780,margin:'0 auto',display:'flex',gap:20}},

      React.createElement('div',{style:{width:240,flexShrink:0}},
        React.createElement('div',{style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:16,marginBottom:12}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:9,marginBottom:12,paddingBottom:12,borderBottom:'0.5px solid var(--color-border-tertiary)'}},
            React.createElement('div',{style:{width:36,height:36,borderRadius:'50%',background:B.dt,color:B.g,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,fontFamily:fs}},'E'),
            React.createElement('div',null,
              React.createElement('div',{style:{fontWeight:600,fontSize:13.5,color:B.ch}},'Eli'),
              React.createElement('div',{style:{fontSize:11.5,color:'#2a9d5c'}},'● Online')
            )
          ),
          React.createElement('p',{style:{fontSize:12.5,color:'var(--color-text-secondary)',lineHeight:1.6,marginBottom:12}},"I know your profile, your pace, and your goals. I can help you plan your next steps, compare programs, or just think through where you're headed."),
          React.createElement('div',{style:{fontSize:11.5,fontWeight:600,color:'var(--color-text-secondary)',marginBottom:7,letterSpacing:'0.3px'}},'TRY ASKING'),
          suggestions.map(s=>React.createElement('button',{key:s,onClick:()=>send(s),style:{display:'block',width:'100%',textAlign:'left',background:'var(--color-background-secondary)',border:'none',borderRadius:7,padding:'7px 10px',fontSize:12.5,color:'var(--color-text-primary)',cursor:'pointer',marginBottom:5,fontFamily:ff}},s))
        ),
        React.createElement('div',{style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:14}},
          React.createElement('div',{style:{fontSize:11.5,fontWeight:600,color:'var(--color-text-secondary)',marginBottom:8,letterSpacing:'0.3px'}},"ALEX'S PATHWAY"),
          [{n:'SQL for Data Science',s:'✓'},{n:'Intro to Python',s:'✓'},{n:'Google Data Analytics',s:'68%'},{n:'Data Viz with Tableau',s:'→'}]
          .map(u=>React.createElement('div',{key:u.n,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'0.5px solid var(--color-border-tertiary)'},},
            React.createElement('span',{style:{fontSize:12,color:'var(--color-text-primary)',flex:1,paddingRight:6}},u.n),
            React.createElement('span',{style:{fontSize:11.5,fontWeight:600,color:u.s==='✓'?'#2a9d5c':u.s==='→'?'#888':B.t}},u.s)
          ))
        )
      ),

      React.createElement('div',{style:{flex:1,background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden'}},
        React.createElement('div',{style:{flex:1,padding:20,overflowY:'auto',display:'flex',flexDirection:'column',gap:12,maxHeight:440}},
          msgs.map((m,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:m.r==='u'?'flex-end':'flex-start',gap:8}},
            m.r==='a'&&React.createElement('div',{style:{width:28,height:28,borderRadius:'50%',background:B.dt,color:B.g,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0,marginTop:2,fontFamily:fs}},'E'),
            React.createElement('div',{style:{maxWidth:'78%',padding:'11px 14px',borderRadius:m.r==='u'?'14px 14px 3px 14px':'14px 14px 14px 3px',background:m.r==='u'?B.t:'var(--color-background-secondary)',color:m.r==='u'?'white':'var(--color-text-primary)',fontSize:13.5,lineHeight:1.65}},m.c)
          )),
          loading&&React.createElement('div',{style:{display:'flex',gap:8}},
            React.createElement('div',{style:{width:28,height:28,borderRadius:'50%',background:B.dt,color:B.g,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,fontFamily:fs}},'E'),
            React.createElement('div',{style:{padding:'12px 14px',background:'var(--color-background-secondary)',borderRadius:'14px 14px 14px 3px',display:'flex',gap:5,alignItems:'center'}},
              ['d1','d2','d3'].map(c=>React.createElement('span',{key:c,className:c,style:{width:6,height:6,borderRadius:'50%',background:'var(--color-text-secondary)',display:'inline-block'}}))
            )
          ),
          React.createElement('div',{ref:bot})
        ),
        React.createElement('div',{style:{padding:'12px 16px',borderTop:'0.5px solid var(--color-border-tertiary)',display:'flex',gap:9}},
          React.createElement('input',{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(),placeholder:'Ask Eli about your learning path...',style:{flex:1,fontSize:13.5,padding:'9px 13px',border:'0.5px solid var(--color-border-secondary)',borderRadius:8,outline:'none',background:'var(--color-background-secondary)',color:'var(--color-text-primary)',fontFamily:ff}}),
          React.createElement('button',{onClick:()=>send(),disabled:loading,style:{background:B.t,color:'white',border:'none',borderRadius:8,padding:'9px 18px',fontSize:13.5,fontWeight:500,cursor:'pointer',fontFamily:ff}},'Send')
        )
      )
    )
  );
}

function CommunityScreen(){
  const init=[
    {id:1,a:'Jordan M.',i:'JM',c:'#6340CC',role:'Career changer → UX Design',badge:'UX Design',time:'2h ago',t:"Just passed my Google UX Design final project review! Two years ago I was working retail and had no idea what UX even meant. The pathway builder pointed me here and I'm genuinely glad it did.",l:47,lk:false,comments:3},
    {id:2,a:'Priya S.',i:'PS',c:B.t,role:'Healthcare → Data Analytics',badge:'Data & AI',time:'5h ago',t:"Hot take: the SQL for Data Science course from UC Davis is way better than most paid bootcamp content. Free, rigorous, and you actually build things. Eli found it for me and I almost skipped it.",l:31,lk:false,comments:7},
    {id:3,a:'Marcus W.',i:'MW',c:B.r,role:'First-generation learner',badge:'Business',time:'1d ago',t:"The thing nobody tells you about career changing at 34 with two kids: it's possible but it takes a system. Having a record that tracks every step means nothing gets lost. That matters more than I expected.",l:89,lk:false,comments:12},
    {id:4,a:'Sun-Yi K.',i:'SK',c:'#8a6800',role:'Trades → Project Management',badge:'Business',time:'2d ago',t:"Finished my PMP prep course last night. Three years of construction experience, now I have the credential to go with it. Elikonas was the first place that treated my field experience as real learning.",l:64,lk:false,comments:5},
  ];
  const [musings,setMusings]=useState(init);
  const [draft,setDraft]=useState('');
  const [filter,setFilter]=useState('All');
  const tags=['All','Data & AI','Technology','Business','Healthcare','Trades'];
  const toggle=id=>setMusings(p=>p.map(m=>m.id===id?{...m,lk:!m.lk,l:m.lk?m.l-1:m.l+1}:m));
  const post=()=>{if(!draft.trim())return;setMusings(p=>[{id:Date.now(),a:'Alex Lee',i:'AL',c:B.dt,role:'Career changer · Data & AI',badge:'Data & AI',time:'Just now',t:draft,l:0,lk:false,comments:0},...p]);setDraft('');};
  const shown=filter==='All'?musings:musings.filter(m=>m.badge===filter);
  return React.createElement('div',{style:{fontFamily:ff,background:'var(--color-background-tertiary)',minHeight:'calc(100vh - 52px)',padding:28}},
    React.createElement('div',{style:{maxWidth:820,margin:'0 auto'}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}},
        React.createElement('div',null,
          React.createElement('h2',{style:{fontSize:24,fontWeight:600,color:B.ch,fontFamily:fs,marginBottom:4}},'Community musings'),
          React.createElement('p',{style:{fontSize:13.5,color:'var(--color-text-secondary)'}},'Real stories from learners on their own paths')
        ),
        React.createElement('div',{style:{display:'flex',gap:6}},
          tags.map(tag=>React.createElement('button',{key:tag,onClick:()=>setFilter(tag),style:{background:filter===tag?B.t:'var(--color-background-primary)',color:filter===tag?'white':'var(--color-text-secondary)',border:`0.5px solid ${filter===tag?B.t:'var(--color-border-tertiary)'}`,borderRadius:7,padding:'5px 12px',fontSize:12,cursor:'pointer',fontFamily:ff}},tag))
        )
      ),
      React.createElement('div',{style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:16,marginBottom:16}},
        React.createElement('div',{style:{display:'flex',gap:10,alignItems:'flex-start'}},
          React.createElement('div',{style:{width:34,height:34,borderRadius:'50%',background:B.dt,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11.5,fontWeight:600,flexShrink:0}},'AL'),
          React.createElement('div',{style:{flex:1}},
            React.createElement('textarea',{value:draft,onChange:e=>setDraft(e.target.value),placeholder:"Share something from your learning journey...",style:{width:'100%',border:'none',outline:'none',resize:'none',fontSize:13.5,lineHeight:1.65,color:'var(--color-text-primary)',background:'transparent',minHeight:52,fontFamily:ff}}),
            draft.trim()&&React.createElement('div',{style:{display:'flex',justifyContent:'flex-end',paddingTop:8,borderTop:'0.5px solid var(--color-border-tertiary)'}},
              React.createElement('button',{onClick:post,style:{background:B.t,color:'white',border:'none',borderRadius:7,padding:'6px 16px',fontSize:12.5,fontWeight:500,cursor:'pointer',fontFamily:ff}},'Post musing')
            )
          )
        )
      ),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        shown.map(m=>React.createElement('div',{key:m.id,style:{background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:'18px 20px'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:11}},
            React.createElement('div',{style:{width:36,height:36,borderRadius:'50%',background:m.c,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,flexShrink:0}},m.i),
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
                React.createElement('span',{style:{fontWeight:600,fontSize:14,color:B.ch}},m.a),
                React.createElement('span',{style:{fontSize:11.5,background:`${B.t}14`,color:B.t,padding:'2px 8px',borderRadius:8,fontWeight:500}},m.badge)
              ),
              React.createElement('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginTop:1}},m.role)
            ),
            React.createElement('div',{style:{fontSize:11.5,color:'var(--color-text-secondary)'}},m.time)
          ),
          React.createElement('p',{style:{fontSize:13.5,lineHeight:1.7,color:'var(--color-text-primary)',marginBottom:12}},m.t),
          React.createElement('div',{style:{display:'flex',gap:16,borderTop:'0.5px solid var(--color-border-tertiary)',paddingTop:10}},
            React.createElement('button',{onClick:()=>toggle(m.id),style:{background:'none',border:'none',cursor:'pointer',fontSize:13,color:m.lk?B.r:'var(--color-text-secondary)',display:'flex',alignItems:'center',gap:5,padding:0,fontWeight:m.lk?500:400,fontFamily:ff}},
              m.lk?'♥':'♡',' ',m.l,' ',m.l===1?'like':'likes'
            ),
            React.createElement('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--color-text-secondary)',display:'flex',alignItems:'center',gap:5,padding:0,fontFamily:ff}},
              '○ ',m.comments,' ',m.comments===1?'comment':'comments'
            )
          )
        ))
      )
    )
  );
}

function App(){
  const [screen,set]=useState('My Profile');
  const screens={'My Profile':React.createElement(ProfileScreen),'AI Guide':React.createElement(AIGuideScreen),'Community':React.createElement(CommunityScreen)};
  return React.createElement('div',null,React.createElement(TopBar,{active:screen,set}),screens[screen]);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
